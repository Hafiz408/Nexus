name: Smoke Tests

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  backend-smoke-test:
    name: Backend smoke test (health + index + chat)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.prod.txt

      - name: Start backend
        run: |
          cd backend
          uvicorn app.main:app --host 127.0.0.1 --port 8900 &
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:8900/api/health > /dev/null; then
              echo "Backend ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Health check
        run: |
          response=$(curl -sf http://127.0.0.1:8900/api/health)
          echo "$response"
          echo "$response" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['status'] == 'ok', f'Expected ok, got {d}'
          print('Health check: PASSED')
          "

      - name: Index smoke test
        run: |
          REPO_PATH="$(pwd)/backend/app"
          DB_PATH="/tmp/ci-test.db"

          curl -sf -X POST http://127.0.0.1:8900/index \
            -H "Content-Type: application/json" \
            -d "{\"repo_path\": \"$REPO_PATH\", \"db_path\": \"$DB_PATH\"}"

          for i in $(seq 1 30); do
            ENCODED=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1]))" "$REPO_PATH")
            status=$(curl -sf "http://127.0.0.1:8900/index/status?repo_path=$ENCODED")
            echo "Poll $i: $status"
            state=$(echo "$status" | python3 -c "import sys, json; print(json.load(sys.stdin)['status'])")
            if [ "$state" = "complete" ]; then
              nodes=$(echo "$status" | python3 -c "import sys, json; print(json.load(sys.stdin)['nodes_indexed'])")
              echo "Index complete — nodes: $nodes"
              [ "$nodes" -gt 0 ] || { echo "ERROR: 0 nodes indexed"; exit 1; }
              break
            elif [ "$state" = "failed" ]; then
              echo "ERROR: indexing failed"
              exit 1
            fi
            sleep 2
          done

      - name: Chat smoke test (SSE stream)
        run: |
          REPO_PATH="$(pwd)/backend/app"
          response=$(curl -s -X POST http://127.0.0.1:8900/query \
            -H "Content-Type: application/json" \
            -d "{
              \"question\": \"What does graph_builder.py do?\",
              \"repo_path\": \"$REPO_PATH\",
              \"db_path\": \"/tmp/ci-test.db\",
              \"max_nodes\": 3,
              \"hop_depth\": 1
            }" || true)

          echo "SSE response preview:"
          echo "$response" | head -c 500
          echo "$response" | grep -q "^event:" || { echo "ERROR: no SSE events in response"; exit 1; }
          echo "Chat SSE stream: PASSED"

  changelog-check:
    name: Changelog entry check
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Verify CHANGELOG entry matches tag
        env:
          GIT_REF: ${{ github.ref }}
        run: |
          TAG="${GIT_REF#refs/tags/v}"
          echo "Checking for version $TAG in extension/CHANGELOG.md"
          if grep -qF "## [$TAG]" extension/CHANGELOG.md; then
            echo "CHANGELOG entry found for $TAG — OK"
          else
            echo "ERROR: No CHANGELOG.md entry for version $TAG"
            echo "Add a '## [$TAG]' section to extension/CHANGELOG.md before tagging."
            exit 1
          fi

  extension-build:
    name: Extension build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd extension && npm ci

      - name: Build extension
        run: cd extension && npm run build
