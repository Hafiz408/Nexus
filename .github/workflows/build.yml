name: Build and Package Nexus

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    name: Build backend (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary
        run: |
          cd backend
          python build.py

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: nexus-backend-mac
          path: extension/bin/nexus-backend-mac

  build-win:
    name: Build backend (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary
        run: |
          cd backend
          python build.py

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: nexus-backend-win
          path: extension/bin/nexus-backend-win.exe

  package:
    name: Package .vsix
    runs-on: ubuntu-latest
    needs: [build-mac, build-win]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download Mac binary
        uses: actions/download-artifact@v4
        with:
          name: nexus-backend-mac
          path: extension/bin/

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: nexus-backend-win
          path: extension/bin/

      - name: Make Mac binary executable
        run: chmod +x extension/bin/nexus-backend-mac

      - name: Install extension dependencies
        run: cd extension && npm ci

      - name: Build extension
        run: cd extension && npm run build

      - name: Package .vsix
        run: |
          cd extension
          npm install -g @vscode/vsce
          vsce package --out nexus.vsix

      - name: Upload .vsix
        uses: actions/upload-artifact@v4
        with:
          name: nexus-vsix
          path: extension/nexus.vsix

  publish:
    name: Publish to Marketplace
    runs-on: ubuntu-latest
    needs: [package]
    steps:
      - name: Download .vsix
        uses: actions/download-artifact@v4
        with:
          name: nexus-vsix
          path: extension/

      - name: Publish to VS Code Marketplace
        run: |
          npm install -g @vscode/vsce
          vsce publish --packagePath extension/nexus.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        run: |
          npm install -g ovsx
          ovsx publish extension/nexus.vsix -p $OVSX_TOKEN
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
