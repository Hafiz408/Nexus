name: Build and Package Nexus

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  backend-smoke-test:
    name: Backend smoke test (health + index + chat)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: cd backend && pip install -r requirements.prod.txt

      - name: Start backend
        run: |
          cd backend
          uvicorn app.main:app --host 127.0.0.1 --port 8900 &
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:8900/api/health > /dev/null; then
              echo "Backend ready after ${i}s"; break
            fi
            sleep 1
          done

      - name: Health check
        run: |
          curl -sf http://127.0.0.1:8900/api/health | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['status'] == 'ok', f'Expected ok, got {d}'
          print('Health check: PASSED')
          "

      - name: Push config with API key
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          curl -sf -X POST http://127.0.0.1:8900/api/config \
            -H "Content-Type: application/json" \
            -d "{\"chat_provider\": \"mistral\", \"embedding_provider\": \"mistral\", \"chat_model\": \"mistral-small-latest\", \"embedding_model\": \"mistral-embed\", \"api_keys\": {\"mistral\": \"$MISTRAL_API_KEY\"}, \"db_path\": \"/tmp/ci-test.db\"}"
          echo "Config pushed"

      - name: Index smoke test
        run: |
          REPO_PATH="$(pwd)/backend/app"
          curl -sf -X POST http://127.0.0.1:8900/index \
            -H "Content-Type: application/json" \
            -d "{\"repo_path\": \"$REPO_PATH\", \"db_path\": \"/tmp/ci-test.db\"}"
          for i in $(seq 1 30); do
            ENCODED=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1]))" "$REPO_PATH")
            status=$(curl -sf "http://127.0.0.1:8900/index/status?repo_path=$ENCODED")
            echo "Poll $i: $status"
            state=$(echo "$status" | python3 -c "import sys, json; print(json.load(sys.stdin)['status'])")
            if [ "$state" = "complete" ]; then
              edges=$(echo "$status" | python3 -c "import sys, json; print(json.load(sys.stdin)['edges_indexed'])")
              files=$(echo "$status" | python3 -c "import sys, json; print(json.load(sys.stdin)['files_processed'])")
              nodes=$(echo "$status" | python3 -c "import sys, json; print(json.load(sys.stdin)['nodes_indexed'])")
              echo "Index complete — edges: $edges, files: $files, nodes (embedded): $nodes"
              [ "$edges" -gt 0 ] || { echo "ERROR: 0 edges — graph was not built"; exit 1; }
              [ "$files" -gt 0 ] || { echo "ERROR: 0 files processed"; exit 1; }
              [ "$nodes" -gt 0 ] || { echo "ERROR: 0 nodes embedded — check MISTRAL_API_KEY secret"; exit 1; }
              break
            elif [ "$state" = "failed" ]; then
              echo "ERROR: indexing failed"; exit 1
            fi
            sleep 2
          done

      - name: Chat smoke test (full LLM stream)
        run: |
          REPO_PATH="$(pwd)/backend/app"
          response=$(curl -s -X POST http://127.0.0.1:8900/query \
            -H "Content-Type: application/json" \
            -d "{\"question\": \"What does graph_builder.py do?\", \"repo_path\": \"$REPO_PATH\", \"db_path\": \"/tmp/ci-test.db\", \"max_nodes\": 3, \"hop_depth\": 1}" || true)
          echo "SSE response preview:"
          echo "$response" | head -c 800
          echo "$response" | grep -q "^event: token" || { echo "ERROR: no token events — LLM did not stream"; exit 1; }
          echo "$response" | grep -q "^event: citations" || { echo "ERROR: no citations event"; exit 1; }
          echo "$response" | grep -q "^event: done" || { echo "ERROR: no done event — stream did not complete"; exit 1; }
          echo "Chat SSE stream: PASSED"

  changelog-check:
    name: Version consistency check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed to read all tags

      - name: Verify tag, package.json, and CHANGELOG all match
        env:
          GIT_REF: ${{ github.ref }}
        run: |
          # Resolve version: use the pushed tag if available, else latest semver tag
          if [[ "$GIT_REF" == refs/tags/v* ]]; then
            VERSION="${GIT_REF#refs/tags/v}"
            echo "Triggered by tag: $VERSION"
          else
            VERSION=$(git tag --list "v*" --sort=-version:refname | head -1 | sed "s/^v//")
            echo "workflow_dispatch — using latest tag: $VERSION"
          fi

          echo "Checking version: $VERSION"

          # 1. package.json must match
          PKG_VERSION=$(python3 -c "import json; print(json.load(open('extension/package.json'))['version'])")
          if [ "$PKG_VERSION" != "$VERSION" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) does not match tag ($VERSION)"
            exit 1
          fi
          echo "package.json: $PKG_VERSION — OK"

          # 2. CHANGELOG.md must have an entry
          if grep -qF "## [$VERSION]" extension/CHANGELOG.md; then
            echo "CHANGELOG.md: entry for $VERSION found — OK"
          else
            echo "ERROR: No CHANGELOG.md entry for version $VERSION"
            echo "Add a '## [$VERSION]' section to extension/CHANGELOG.md before tagging."
            exit 1
          fi

  extension-build:
    name: Extension build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd extension && npm ci

      - name: Build extension
        run: cd extension && npm run build

  build-mac:
    name: Build backend (macOS)
    runs-on: macos-latest
    needs: [backend-smoke-test, changelog-check, extension-build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python with loadable sqlite extensions (Homebrew)
        run: |
          brew install python@3.11
          echo "$(brew --prefix python@3.11)/bin" >> $GITHUB_PATH

      - name: Verify sqlite-vec extension support
        run: |
          python3 -c "import sqlite3; c=sqlite3.connect(':memory:'); c.enable_load_extension(True); print('enable_load_extension: OK')"

      - name: Install dependencies
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          cd backend
          pip install -r requirements.prod.txt
          pip install pyinstaller

      - name: Build binary
        run: |
          source .venv/bin/activate
          cd backend
          python build.py

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: nexus-backend-mac
          path: extension/bin/nexus-backend-mac.tar.gz

  build-win:
    name: Build backend (Windows)
    runs-on: windows-latest
    needs: [backend-smoke-test, changelog-check, extension-build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify sqlite-vec extension support
        run: |
          python -c "import sqlite3; c=sqlite3.connect(':memory:'); c.enable_load_extension(True); print('enable_load_extension: OK')"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary
        run: |
          cd backend
          python build.py

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: nexus-backend-win
          path: extension/bin/nexus-backend-win.tar.gz

  package:
    name: Package .vsix
    runs-on: ubuntu-latest
    needs: [build-mac, build-win]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download Mac binary
        uses: actions/download-artifact@v4
        with:
          name: nexus-backend-mac
          path: extension/bin/

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: nexus-backend-win
          path: extension/bin/


      - name: Install extension dependencies
        run: cd extension && npm ci

      - name: Build extension
        run: cd extension && npm run build

      - name: Package .vsix
        run: |
          cd extension
          npm install -g @vscode/vsce
          vsce package --out nexus.vsix

      - name: Upload .vsix
        uses: actions/upload-artifact@v4
        with:
          name: nexus-vsix
          path: extension/nexus.vsix

  publish:
    name: Publish to Marketplace
    runs-on: ubuntu-latest
    needs: [package]
    steps:
      - name: Download .vsix
        uses: actions/download-artifact@v4
        with:
          name: nexus-vsix
          path: extension/

      - name: Publish to VS Code Marketplace
        run: |
          npm install -g @vscode/vsce
          vsce publish --packagePath extension/nexus.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        run: |
          npm install -g ovsx
          ovsx publish extension/nexus.vsix -p $OVSX_TOKEN
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
