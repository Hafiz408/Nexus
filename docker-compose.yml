# Nexus V1 Docker Compose Stack
# Uses Docker Compose v2 syntax (docker compose, not docker-compose)
#
# Note: postgres is mapped to host port 5433 (not 5432) to avoid conflicts
# with any local postgres instance already running on the default port.
# Connect from host: psql -h localhost -p 5433 -U $POSTGRES_USER -d $POSTGRES_DB

services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: nexus_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # 5433 on host maps to 5432 in container — avoids conflict with local postgres
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build: ./backend
    container_name: nexus_backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    volumes:
      # Bind mount (not named volume) — SQLite files persist on host in ./data/
      # and survive docker compose down (only removed with explicit rm -rf ./data)
      - ./data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
